name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Swift version
        run: swift --version
      - name: Check version consistency
        run: ./scripts/check_version_consistency.sh
      - name: Build
        run: swift build
      - name: Check example specs
        run: ./scripts/check_example_specs.sh
      - name: Test
        run: swift test
